<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MÁME PLÁN</title>
  <style>
    /* reset a full-screen layout */
    html, body {
      height: 100%;
      margin: 0;
      font-family: system-ui, sans-serif;
    }

    /* --- Styl pro startovací obrazovku (Overlay) --- */
    #intro-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.8s ease-out;
      color: white;
      text-align: center;
    }

    #intro-overlay h1 {
      margin-bottom: 30px;
      font-weight: 300;
      letter-spacing: 2px;
    }

    #enter-btn {
      padding: 15px 40px;
      font-size: 18px;
      color: white;
      background: transparent;
      border: 2px solid white;
      border-radius: 30px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }

    #enter-btn:hover {
      background: white;
      color: black;
    }

    /* --- Původní styly pro obsah --- */
    
    /* kontejner, aby obrázek zabíral celou obrazovku */
    .full {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      overflow: hidden;
    }

    /* obrázek se přizpůsobí obrazovce bez oříznutí */
    .full img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* ZMĚNĚNO: 'contain' místo 'cover' */
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      cursor: pointer;
    }

    /* malý text nápovědy */
    .hint {
      position: absolute;
      bottom: 12px;
      left: 12px;
      color: rgba(255,255,255,0.85);
      font-size: 14px;
      background: rgba(0,0,0,0.35);
      padding: 6px 8px;
      border-radius: 6px;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="intro-overlay">
    <h1>Máš plán?</h1>
    <button id="enter-btn">ANO!</button>
  </div>

  <audio id="bg-music" src="plan.mp3" loop></audio>

  <a class="full" href="https://github.com/Matyl2784/MAMEPLAN/releases/download/oficial_release/mameplan.apk" download>
    <img src="plan.png" onerror="this.src='https://placehold.co/1920x1080/1a1a1a/white?text=Plan.png+Missing'" alt="Obrázek přes celou obrazovku" />
  </a>

  <div class="hint">Klikni kamkoli pro stažení souboru</div>

  <script>
    const enterBtn = document.getElementById('enter-btn');
    const overlay = document.getElementById('intro-overlay');
    const audio = document.getElementById('bg-music');

    enterBtn.addEventListener('click', function() {
      audio.play().catch(function(error) {
        console.log("Přehrávání audia selhalo: ", error);
      });

      overlay.style.opacity = '0';

      setTimeout(function() {
        overlay.style.display = 'none';
      }, 800);
    });
  </script>
</body>
</html>
